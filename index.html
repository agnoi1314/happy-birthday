<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快乐！</title>
    <style>
        :root {
            --bg-color: #fce4ec;
            --text-color: #880e4f;
            --accent-color: #ff4081;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 100%);
            font-family: "Microsoft YaHei", sans-serif;
        }

        #container {
            text-align: center;
            z-index: 10;
        }

        h1 {
            color: var(--text-color);
            margin-bottom: 20px;
            font-size: 2.5rem;
            opacity: 0.8;
        }

        /* 蛋糕样式 */
        .cake {
            position: relative;
            width: 150px;
            height: 100px;
            background: #6d4c41;
            border-radius: 10px 10px 0 0;
            margin: 0 auto;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .cake::before {
            content: "";
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            height: 20px;
            background: #f48fb1; /* 草莓夹层 */
        }

        /* 蜡烛 */
        .candle {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 40px;
            background: #fff59d;
            border-radius: 4px 4px 0 0;
        }

        /* 火焰 */
        .flame {
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 25px;
            background: #ff9800;
            border-radius: 50% 50% 20% 20%;
            display: none; /* 初始隐藏 */
            animation: flicker 0.1s infinite alternate;
            box-shadow: 0 0 20px #ff9800;
        }

        @keyframes flicker {
            from { transform: translateX(-50%) scale(1); }
            to { transform: translateX(-50%) scale(1.1); }
        }

        /* 祝福语标签（弹幕） */
        .wish-tag {
            position: absolute;
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            white-space: nowrap;
            pointer-events: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            animation: floatUp 4s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(-100px) scale(1.2); opacity: 0; }
        }

        .hint {
            margin-top: 30px;
            color: #ad1457;
            font-size: 0.9rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

<div id="container">
    <h1>Happy Birthday!</h1>
    <div class="cake" onclick="ignite()">
        <div class="candle"></div>
        <div class="flame" id="flame"></div>
    </div>
    <div class="hint" id="hint">点火试试看 👆</div>
</div>

<script>
    const wishes = [
        "万事如意", "期末不挂科", "奶茶喝不胖", "永远18岁", 
        "前程似锦", "平安幸福", "暴富暴美", "论文一稿过", 
        "天天开心", "好运连连", "光芒万丈", "心想事成",
        "眼里有星辰", "被温柔以待", "早八不困", "优秀不停"
    ];

    const colors = ['#FF8A80', '#FF80AB', '#EA80FC', '#B388FF', '#8C9EFF', '#80D8FF', '#A7FFEB', '#CCFF90'];

    function ignite() {
        const flame = document.getElementById('flame');
        const hint = document.getElementById('hint');
        
        if (flame.style.display === 'block') return; // 防止重复点击

        // 1. 点燃蜡烛
        flame.style.display = 'block';
        hint.innerText = "祝你生日快乐！✨";

        // 2. 持续生成弹幕
        let count = 0;
        const interval = setInterval(() => {
            createWish();
            count++;
            if (count > 50) clearInterval(interval); // 生成50个后停止
        }, 150);
    }

    function createWish() {
        const tag = document.createElement('div');
        tag.className = 'wish-tag';
        
        // 随机内容和颜色
        tag.innerText = wishes[Math.floor(Math.random() * wishes.length)];
        tag.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        
        // 随机位置
        tag.style.left = Math.random() * 80 + 10 + 'vw';
        // 随机动画时长
        tag.style.animationDuration = (Math.random() * 2 + 3) + 's';

        document.body.appendChild(tag);

        // 动画结束后移除元素
        tag.addEventListener('animationend', () => {
            tag.remove();
        });
    }
</script>

</body>
</html>
